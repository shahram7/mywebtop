network:
  protocol: http
  websocket_port: 8443
  ssl:
    pem_certificate: /etc/kasmvnc/certs/self.crt
    pem_key: /etc/kasmvnc/certs/self.key
  udp:
    public_ip: auto

desktop:
  allow_resize: true

encoding:
  max_frame_rate: 60
  full_frame_updates: 0
  rect_encoding_mode:
    min_quality: 4
    max_quality: 7

user_session:
  clipboard: {}

logging:
  level: 30