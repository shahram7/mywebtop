services:
  kde-desktop:
    build: .
    image: ubuntu-kde-kasmvnc:local
    container_name: kde-desktop
    ports:
      - "8443:8443"
    environment:
      - VNC_PASSWORD=changeme
      - VNC_RESOLUTION=1920x1080
      - VNC_COL_DEPTH=24
      - MAX_FRAME_RATE=60
    shm_size: '1gb'
    restart: unless-stopped
