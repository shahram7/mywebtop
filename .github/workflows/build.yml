name: Build & Push mywebtop

on:
  schedule:
    # Every Monday 04:00 UTC – picks up new Ubuntu packages and updated base image
    - cron: "0 4 * * 1"

  push:
    branches: ["main"]
    paths:
      - "Dockerfile"
      - "root/**"
      - ".github/workflows/build.yml"

  workflow_dispatch:

permissions:
  contents: read
  packages: write   # required to push to ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      # Expose secret as env var so we can safely check it in if: conditions
      HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_TOKEN != '' && 'true' || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR login – GITHUB_TOKEN is injected automatically by GitHub, no secret needed
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Hub login – only runs if DOCKERHUB_TOKEN secret exists
      - name: Log in to Docker Hub
        if: env.HAS_DOCKERHUB == 'true'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tags for GHCR (always)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mywebtop
          tags: |
            type=raw,value=latest
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=sha,prefix=git-

      # If Docker Hub secrets exist, append extra tags for it
      - name: Add Docker Hub tags
        if: env.HAS_DOCKERHUB == 'true'
        run: |
          OWNER="${{ secrets.DOCKERHUB_USERNAME }}"
          # Append Docker Hub tags to the bake file output from metadata-action
          echo "EXTRA_TAGS=docker.io/${OWNER}/mywebtop:latest,docker.io/${OWNER}/mywebtop:$(date +%Y%m%d)" >> "$GITHUB_ENV"

      # Check if upstream base image digest has changed (for scheduled runs)
      - name: Check upstream base image digest
        id: upstream
        run: |
          BASE="ghcr.io/linuxserver/baseimage-kasmvnc:ubuntunoble"
          DIGEST=$(docker buildx imagetools inspect "${BASE}" \
            --format '{{json .Manifest.Digest}}' 2>/dev/null | tr -d '"' || echo "unknown")
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Upstream digest: ${DIGEST}"

      - name: Restore cached upstream digest
        id: cache
        uses: actions/cache@v4
        with:
          path: .upstream-digest
          key: upstream-digest-${{ steps.upstream.outputs.digest }}

      - name: Decide whether to build
        id: should_build
        run: |
          if [[ "${{ github.event_name }}" == "push" || \
                "${{ github.event_name }}" == "workflow_dispatch" || \
                "${{ steps.cache.outputs.cache-hit }}" != "true" ]]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "Upstream base image unchanged – skipping build."
          fi

      # Build and push – GHCR always, Docker Hub if secrets present
      - name: Build and push
        if: steps.should_build.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.EXTRA_TAGS }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save upstream digest
        if: steps.should_build.outputs.build == 'true'
        run: echo "${{ steps.upstream.outputs.digest }}" > .upstream-digest
