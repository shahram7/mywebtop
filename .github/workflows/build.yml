name: Build & Push Docker Image

on:
  # ── Automatic triggers ──────────────────────────────────────────
  schedule:
    # Run every Monday at 04:00 UTC – picks up new Ubuntu packages,
    # new KasmVNC base images, and new Alpine/Ubuntu upstream releases.
    - cron: "0 4 * * 1"

  # Rebuild whenever the Dockerfile or startup script changes
  push:
    branches: ["main"]
    paths:
      - "Dockerfile"
      - "root/**"
      - ".github/workflows/build.yml"

  # Allow manual rebuilds from the GitHub Actions UI
  workflow_dispatch:

# ── Permissions ─────────────────────────────────────────────────
permissions:
  contents: read
  packages: write   # needed to push to ghcr.io

# ── Job ─────────────────────────────────────────────────────────
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up QEMU for multi-arch builds (optional but future-proof)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Generate build metadata (tags + labels)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            # ghcr.io/${{ github.repository_owner }}/mywebtop
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/mywebtop  # uncomment for Docker Hub
          tags: |
            type=raw,value=latest
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=sha,prefix=git-

      # 6. Check whether the upstream base image has changed since the last build.
      #    We pull the upstream manifest digest and compare it to the cached one.
      #    If it matches (nothing changed upstream AND no code push triggered this),
      #    we skip the expensive build step.
      - name: Check upstream base image digest
        id: upstream
        run: |
          BASE="ghcr.io/linuxserver/baseimage-kasmvnc:ubuntu2404"
          DIGEST=$(docker buildx imagetools inspect "${BASE}" \
            --format '{{json .Manifest.Digest}}' 2>/dev/null | tr -d '"' || echo "unknown")
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Upstream digest: ${DIGEST}"

      - name: Restore cached upstream digest
        id: cache
        uses: actions/cache@v4
        with:
          path: .upstream-digest
          key: upstream-digest-${{ steps.upstream.outputs.digest }}

      - name: Decide whether to build
        id: should_build
        run: |
          # Always build on push events or manual triggers.
          # On schedule: build only if upstream digest changed (cache miss).
          if [[ "${{ github.event_name }}" == "push" || \
                "${{ github.event_name }}" == "workflow_dispatch" || \
                "${{ steps.cache.outputs.cache-hit }}" != "true" ]]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "Upstream base image unchanged – skipping build."
          fi

      # 7. Build and push (amd64 + arm64)
      - name: Build and push
        if: steps.should_build.outputs.build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
          # Use GitHub Actions cache to speed up repeated builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 8. Save the upstream digest so next scheduled run can compare
      - name: Save upstream digest to cache
        if: steps.should_build.outputs.build == 'true'
        run: echo "${{ steps.upstream.outputs.digest }}" > .upstream-digest
